<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Digital | Vendedores Freelance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .animate-fade { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyBdaejVklzmuQF5wpEECmtIy5Rv6lSDce8",
          authDomain: "catalogo-vendedores-freelance.firebaseapp.com",
          projectId: "catalogo-vendedores-freelance",
          storageBucket: "catalogo-vendedores-freelance.firebasestorage.app",
          messagingSenderId: "994101056111",
          appId: "1:994101056111:web:ee05a0d7f1810e2964739a"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const normalize = (t) => t ? t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const params = new URLSearchParams(window.location.search);
            const vendorId = (params.get('v') || 'ventas').toLowerCase();
            const catParam = params.get('c'); 

            const [view, setView] = useState("catalog");
            const [products, setProducts] = useState([]);
            const [config, setConfig] = useState({ tasa_bcv: 1, vendorName: "Cargando...", whatsapp: "", adminEmail: "" });
            const [user, setUser] = useState(null);

           useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(u => setUser(u));

                const unsubConfig = db.collection('vendors').doc(vendorId).collection('config').doc('general')
                    .onSnapshot(doc => { if (doc.exists) setConfig(doc.data()); });

                const unsubProd = db.collection('vendors').doc(vendorId).collection('products')
                    .onSnapshot(snap => {
                        const items = [];
                        snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                        // ✨ AQUÍ ESTÁ LA CORRECCIÓN: Envolvemos los códigos en String()
                        setProducts(items.sort((a,b) => String(a.code || "").localeCompare(String(b.code || ""))));
                    }, error => {
                        console.error("Error de Firebase:", error);
                    });

                return () => { unsubAuth(); unsubConfig(); unsubProd(); };
            }, [vendorId]);
            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 shadow-2xl animate-fade overflow-hidden relative">
                    {(view === "catalog" || view === "cart") && <Storefront view={view} setView={setView} products={products} config={config} categoryFilter={catParam} />}
                    {view === "login" && <LoginScreen setView={setView} user={user} />}
                    {view === "admin" && <AdminPanel setView={setView} products={products} config={config} vendorId={vendorId} user={user} />}
                    
                    {view === "catalog" && (
                        <footer className="py-8 text-center opacity-30">
                            <button onDoubleClick={() => setView(user ? "admin" : "login")} className="p-4"><i className="fa-solid fa-lock"></i> Admin</button>
                        </footer>
                    )}
                </div>
            );
        }

        // --- PANTALLA DE LOGIN ---
        function LoginScreen({ setView, user }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [isReset, setIsReset] = useState(false);

            useEffect(() => { if (user) setView("admin"); }, [user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { alert("Error: Verifica tu correo y contraseña."); }
            };

            const handleReset = async (e) => {
                e.preventDefault();
                if(!email) return alert("Escribe tu correo primero");
                try {
                    await auth.sendPasswordResetEmail(email);
                    alert("Correo de recuperación enviado.");
                    setIsReset(false);
                } catch (err) { alert("Error al enviar correo."); }
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 z-50 absolute inset-0">
                    <div className="bg-white p-8 rounded-3xl w-full shadow-2xl">
                        <h2 className="text-xl font-black text-slate-800 uppercase text-center mb-6">{isReset ? 'Recuperar Clave' : 'Acceso Admin'}</h2>
                        <form onSubmit={isReset ? handleReset : handleLogin} className="space-y-4">
                            <input type="email" placeholder="Correo electrónico" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={email} onChange={e=>setEmail(e.target.value)} required />
                            {!isReset && <input type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={password} onChange={e=>setPassword(e.target.value)} required />}
                            <button type="submit" className="w-full bg-blue-500 hover:bg-blue-600 transition text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">{isReset ? 'Enviar Link' : 'Ingresar'}</button>
                        </form>
                        <div className="mt-6 flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                            <button onClick={() => setIsReset(!isReset)} className="hover:text-blue-500">{isReset ? 'Volver al Login' : 'Olvidé mi clave'}</button>
                            <button onClick={() => setView("catalog")} className="hover:text-blue-500">Cancelar</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- PANEL ADMINISTRADOR (PESTAÑAS + BATCH EXCEL + BORRAR TODO) ---
        function AdminPanel({ setView, products, config, vendorId, user }) {
            const [tab, setTab] = useState("productos");
            const [newProd, setNewProd] = useState({ code: "", category: "", name: "", price: "" });
            
            const [editConfig, setEditConfig] = useState({ 
                tasa_bcv: config.tasa_bcv || "", 
                vendorName: config.vendorName || "", 
                whatsapp: config.whatsapp || "",
                adminEmail: config.adminEmail || "" 
            });
            
            const [selectedLinkCat, setSelectedLinkCat] = useState("");
            const [fileName, setFileName] = useState("Ningún archivo seleccionado");
            const fileInputRef = useRef(null);

            const categories = [...new Set(products.map(p => p.category).filter(Boolean))];

            if (!user) { setView("login"); return null; }

            if (config.adminEmail && user.email.toLowerCase() !== config.adminEmail.toLowerCase()) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 text-center z-50 absolute inset-0">
                        <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                            <i className="fa-solid fa-shield-halved text-rose-500 text-5xl mb-4"></i>
                            <h2 className="text-xl font-black text-slate-800 uppercase mb-2">Acceso Denegado</h2>
                            <p className="text-xs text-slate-500 mb-6">Tu correo <b>{user.email}</b> no tiene permisos.</p>
                            <button onClick={() => { auth.signOut(); setView("catalog"); }} className="w-full bg-slate-900 text-white font-black py-4 rounded-xl uppercase text-xs">Salir al Catálogo</button>
                        </div>
                    </div>
                );
            }

            const addProduct = async (e) => {
                e.preventDefault();
                await db.collection('vendors').doc(vendorId).collection('products').add({
                    code: newProd.code, category: newProd.category, name: newProd.name, price: parseFloat(newProd.price), isActive: true
                });
                setNewProd({ code: "", category: "", name: "", price: "" });
            };

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) { setFileName("Ningún archivo seleccionado"); return; }
                setFileName(file.name);
                
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const wsname = wb.SheetNames[0];
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wsname]);
                        
                        const batch = db.batch();
                        let count = 0;
                        
                        for (let row of data) {
                            if (row.Nombre && row.Precio !== undefined) {
                                let rawPrice = String(row.Precio).replace(',', '.');
                                const finalPrice = parseFloat(rawPrice);
                                
                                if (!isNaN(finalPrice)) {
                                    const newDocRef = db.collection('vendors').doc(vendorId).collection('products').doc();
                                    batch.set(newDocRef, {
                                        code: String(row.Codigo || ""), 
                                        category: String(row.Categoria || "General"), 
                                        name: String(row.Nombre), 
                                        price: finalPrice, 
                                        isActive: true
                                    });
                                    count++;
                                }
                            }
                        }
                        
                        if (count > 0) {
                            await batch.commit();
                            alert(`✅ ¡Éxito! ${count} productos se han cargado correctamente.`);
                        } else {
                            alert("⚠️ No se encontró ningún producto. Verifica que las columnas se llamen 'Nombre' y 'Precio'.");
                        }
                    } catch (error) {
                        console.error(error);
                        alert("❌ Ocurrió un error al procesar el archivo Excel.");
                    } finally {
                        setFileName("Ningún archivo seleccionado");
                        if(fileInputRef.current) fileInputRef.current.value = "";
                    }
                };
                reader.readAsBinaryString(file);
            };

            const deleteAllProducts = async () => {
                const confirmText = prompt("⚠️ ¿ESTÁS SEGURO? Esto borrará TODOS tus productos.\n\nEscribe la palabra BORRAR en mayúsculas para confirmar:");
                if (confirmText === "BORRAR") {
                    try {
                        const snapshot = await db.collection('vendors').doc(vendorId).collection('products').get();
                        const batch = db.batch();
                        snapshot.docs.forEach(doc => {
                            batch.delete(doc.ref);
                        });
                        await batch.commit();
                        alert("🗑️ Lista vaciada correctamente.");
                    } catch (error) {
                        alert("❌ Error al vaciar la lista: " + error.message);
                    }
                } else if (confirmText !== null) {
                    alert("Operación cancelada. No escribiste la palabra correctamente.");
                }
            };

            const toggleVisibility = async (id, currentStatus) => {
                await db.collection('vendors').doc(vendorId).collection('products').doc(id).update({ isActive: !currentStatus });
            };

            const updatePrice = async (id, oldPrice) => {
                const newPrice = prompt("Nuevo precio en $: ", oldPrice);
                if (newPrice && !isNaN(newPrice.replace(',','.'))) {
                    await db.collection('vendors').doc(vendorId).collection('products').doc(id).update({ price: parseFloat(newPrice.replace(',','.')) });
                }
            };

            const deleteProduct = async (id) => {
                if(window.confirm("¿Eliminar este producto?")) await db.collection('vendors').doc(vendorId).collection('products').doc(id).delete();
            };

            const saveConfig = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('vendors').doc(vendorId).collection('config').doc('general').set({
                        vendorName: editConfig.vendorName, 
                        whatsapp: editConfig.whatsapp, 
                        tasa_bcv: parseFloat(editConfig.tasa_bcv), 
                        adminEmail: editConfig.adminEmail.trim().toLowerCase()
                    }, { merge: true });
                    alert("✅ Ajustes guardados correctamente.");
                } catch (error) {
                    alert("❌ Error al guardar: " + error.message);
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col z-50 absolute inset-0">
                    <header className="bg-slate-900 text-white p-5 flex justify-between items-center shadow-md">
                        <div>
                            <h1 className="font-black text-sm uppercase tracking-wide">Panel Admin</h1>
                            <p className="text-[10px] text-blue-400 font-bold uppercase">{user.email}</p>
                        </div>
                        <button onClick={() => { setView("catalog"); }} className="text-[10px] font-black text-white uppercase flex items-center gap-2">
                            <i className="fa-solid fa-store"></i> Tienda <i onClick={(e)=>{e.stopPropagation(); auth.signOut(); setView("catalog");}} className="fa-solid fa-power-off text-rose-500 ml-1 text-base"></i>
                        </button>
                    </header>

                    <div className="flex bg-white shadow-sm text-[10px] font-black uppercase overflow-x-auto">
                        <button onClick={() => setTab("productos")} className={`flex-1 px-4 py-4 whitespace-nowrap transition ${tab === 'productos' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-slate-400'}`}>Productos</button>
                        <button onClick={() => setTab("config")} className={`flex-1 px-4 py-4 whitespace-nowrap transition ${tab === 'config' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-slate-400'}`}>Ajustes</button>
                        <button onClick={() => setTab("links")} className={`flex-1 px-4 py-4 whitespace-nowrap transition ${tab === 'links' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-slate-400'}`}>Links</button>
                    </div>

                    <main className="p-4 flex-1 pb-10 overflow-y-auto">
                        {tab === "productos" && (
                            <div className="space-y-4 animate-fade">
                                <form onSubmit={addProduct} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                    <h2 className="text-[10px] font-black text-blue-600 uppercase mb-4 tracking-widest">Nuevo Producto</h2>
                                    <div className="flex gap-3 mb-3">
                                        <input type="text" placeholder="Código" className="w-1/3 p-3 bg-slate-50 rounded-xl text-xs" value={newProd.code} onChange={e=>setNewProd({...newProd, code: e.target.value})} />
                                        <input type="text" placeholder="Categoría" className="w-2/3 p-3 bg-slate-50 rounded-xl text-xs" value={newProd.category} onChange={e=>setNewProd({...newProd, category: e.target.value})} />
                                    </div>
                                    <input type="text" placeholder="Nombre *" className="w-full p-3 bg-slate-50 rounded-xl text-xs mb-3" value={newProd.name} onChange={e=>setNewProd({...newProd, name: e.target.value})} required />
                                    <input type="number" step="0.01" placeholder="Precio ($) *" className="w-full p-3 bg-slate-50 rounded-xl text-xs mb-5" value={newProd.price} onChange={e=>setNewProd({...newProd, price: e.target.value})} required />
                                    <button type="submit" className="w-full bg-blue-500 hover:bg-blue-600 text-white font-black text-xs py-3.5 rounded-2xl uppercase tracking-widest transition">Guardar Producto</button>
                                </form>

                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-center flex flex-col items-center">
                                    <h2 className="text-[9px] font-black text-slate-400 uppercase mb-3">Carga Masiva Excel</h2>
                                    <input type="file" id="excel-upload" accept=".xlsx, .xls" onChange={handleExcelUpload} ref={fileInputRef} className="hidden" />
                                    <div className="flex items-center gap-3 w-full justify-center">
                                        <label htmlFor="excel-upload" className="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase cursor-pointer hover:bg-slate-900 transition">Seleccionar Archivo</label>
                                        <span className="text-[10px] text-slate-500 font-bold truncate max-w-[120px]">{fileName}</span>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <div className="flex justify-between items-center px-1">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Lista de Productos ({products.length})</h2>
                                        {products.length > 0 && (
                                            <button onClick={deleteAllProducts} className="bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded-xl text-[9px] font-black uppercase transition shadow-sm">
                                                <i className="fa-solid fa-trash-can mr-1"></i> Vaciar Lista
                                            </button>
                                        )}
                                    </div>
                                    
                                    {products.length === 0 && <p className="text-center text-xs text-slate-400 py-4 font-bold">No hay productos en la lista.</p>}
                                    
                                    {products.map(p => (
                                        <div key={p.id} className={`bg-white p-4 rounded-2xl shadow-sm border flex items-center justify-between ${p.isActive === false ? 'opacity-50 border-rose-100' : 'border-slate-50'}`}>
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-wider">{p.code} - {p.category}</p>
                                                <p className="font-bold text-xs uppercase leading-tight mt-0.5 text-slate-800">{p.name}</p>
                                                <p className="font-black text-blue-500 text-sm mt-0.5">${Number(p.price).toFixed(2)}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => updatePrice(p.id, p.price)} className="text-blue-400 p-1"><i className="fa-solid fa-pen text-[11px]"></i></button>
                                                <button onClick={() => toggleVisibility(p.id, p.isActive !== false)} className={`${p.isActive !== false ? 'text-slate-500' : 'text-rose-400'} p-1`}><i className={`fa-solid ${p.isActive !== false ? 'fa-eye' : 'fa-eye-slash'} text-[11px]`}></i></button>
                                                <button onClick={() => deleteProduct(p.id)} className="text-rose-500 p-1"><i className="fa-solid fa-trash text-[11px]"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === "config" && (
                            <form onSubmit={saveConfig} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4 animate-fade">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tasa de Cambio (BS)</label><input type="number" step="0.01" className="w-full p-4 mt-1 bg-slate-50 rounded-xl font-bold border-none" value={editConfig.tasa_bcv} onChange={e=>setEditConfig({...editConfig, tasa_bcv: e.target.value})} required/></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre Vendedor</label><input type="text" className="w-full p-4 mt-1 bg-slate-50 rounded-xl font-bold border-none" value={editConfig.vendorName} onChange={e=>setEditConfig({...editConfig, vendorName: e.target.value})} required/></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">WhatsApp (Ej: 58412...)</label><input type="text" className="w-full p-4 mt-1 bg-slate-50 rounded-xl font-bold border-none" value={editConfig.whatsapp} onChange={e=>setEditConfig({...editConfig, whatsapp: e.target.value})} required/></div>
                                <div className="pt-4 border-t border-slate-100">
                                    <label className="text-[10px] font-black text-blue-600 uppercase tracking-widest"><i className="fa-solid fa-shield-halved"></i> Correo Admin</label>
                                    <input type="email" placeholder="ejemplo@correo.com" className="w-full p-4 mt-1 bg-blue-50 rounded-xl font-bold border border-blue-100 text-blue-900" value={editConfig.adminEmail} onChange={e=>setEditConfig({...editConfig, adminEmail: e.target.value})} required/>
                                </div>
                                <button type="submit" className="w-full bg-blue-500 hover:bg-blue-600 text-white font-black text-xs py-4 rounded-2xl uppercase tracking-widest mt-4">Guardar Ajustes</button>
                            </form>
                        )}

                        {tab === "links" && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 animate-fade">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">Link de Categoría</h2>
                                <select className="w-full p-4 bg-slate-50 border-none rounded-xl mb-4 text-xs font-bold uppercase" value={selectedLinkCat} onChange={e => setSelectedLinkCat(e.target.value)}>
                                    <option value="">Todo (Catálogo General)</option>
                                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => {
                                        let url = window.location.origin + window.location.pathname + '?v=' + vendorId;
                                        if(selectedLinkCat) url += '&c=' + encodeURIComponent(selectedLinkCat);
                                        navigator.clipboard.writeText(url);
                                        alert("✅ Link copiado:\n" + url);
                                    }} className="w-full bg-slate-800 text-white font-black text-xs py-4 rounded-xl uppercase tracking-widest"><i className="fa-solid fa-copy mr-2"></i> Copiar Link</button>
                                    <button onClick={() => {
                                        let url = window.location.origin + window.location.pathname + '?v=' + vendorId;
                                        if(selectedLinkCat) url += '&c=' + encodeURIComponent(selectedLinkCat);
                                        const msg = `¡Hola! Mira nuestro catálogo digital aquí: ${url}`;
                                        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
                                    }} className="w-full bg-green-500 text-white font-black text-xs py-4 rounded-xl uppercase tracking-widest"><i className="fa-brands fa-whatsapp mr-2"></i> Enviar por WhatsApp</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // --- TIENDA Y CARRITO ---
        function Storefront({ view, setView, products, config, categoryFilter }) {
            const [search, setSearch] = useState("");
            const [cart, setCart] = useState([]);
            const [client, setClient] = useState({ name: "", addr: "" });

            const activeProducts = products.filter(p => p.isActive !== false);
            const categoryFiltered = categoryFilter ? activeProducts.filter(p => p.category === categoryFilter) : activeProducts;
            const finalProducts = categoryFiltered.filter(p => normalize(p.name).includes(normalize(search)));
            
            const total = cart.reduce((s, i) => s + (i.p.price * i.qty), 0);

            const updateQty = (p, delta) => {
                const existing = cart.find(item => item.p.id === p.id);
                if (existing) {
                    const newQty = existing.qty + delta;
                    if (newQty <= 0) setCart(cart.filter(item => item.p.id !== p.id));
                    else setCart(cart.map(item => item.p.id === p.id ? { ...item, qty: newQty } : item));
                } else if (delta > 0) { setCart([...cart, { p, qty: 1 }]); }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-30 shadow-xl border-b border-blue-900">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-xs font-black uppercase text-blue-400 tracking-wider">{config.vendorName}</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase">Tasa: Bs {Number(config.tasa_bcv).toFixed(2)}</p>
                            </div>
                            <button onClick={() => setView(view === 'catalog' ? 'cart' : 'catalog')} className="bg-slate-800 p-3 rounded-xl relative border border-slate-700 active:scale-95 transition">
                                <i className={`fa-solid ${view === 'catalog' ? 'fa-cart-shopping' : 'fa-arrow-left'}`}></i>
                                {cart.length > 0 && view === 'catalog' && <span className="absolute -top-1 -right-1 bg-blue-500 text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">{cart.length}</span>}
                            </button>
                        </div>
                        {view === "catalog" && (
                            <div>
                                {categoryFilter && <p className="text-[9px] text-blue-400 font-bold uppercase mb-2 bg-blue-900/30 inline-block px-2 py-1 rounded">Viendo: {categoryFilter}</p>}
                                <input type="text" placeholder="Buscar producto..." className="w-full px-4 py-2.5 rounded-xl bg-slate-800 text-sm border-none text-white focus:ring-2 focus:ring-blue-500" value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                        )}
                    </header>
                    
                    <main className="p-4 flex-1 pb-24 bg-slate-50">
                        {view === "catalog" ? (
                            <div className="space-y-3">
                                {finalProducts.length === 0 && <div className="text-center py-10 text-xs font-bold text-slate-400 uppercase">No hay productos disponibles.</div>}
                                {finalProducts.map(p => {
                                    const inCart = cart.find(i => i.p.id === p.id);
                                    return (
                                        <div key={p.id} className={`bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border transition-all ${inCart ? 'border-blue-400 bg-blue-50/20' : 'border-slate-100'}`}>
                                            <div className="flex-1 pr-3">
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">{p.category}</p>
                                                <h3 className="text-xs font-bold text-slate-800 uppercase leading-tight mt-1">{p.name}</h3>
                                                <p className="text-lg font-black text-slate-950 mt-1">${Number(p.price).toFixed(2)}</p>
                                            </div>
                                            {inCart ? (
                                                <div className="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                                                    <button onClick={() => updateQty(p, -1)} className="w-8 h-8 flex items-center justify-center text-blue-600 active:scale-90"><i className="fa-solid fa-minus text-xs"></i></button>
                                                    <span className="w-8 text-center font-black text-sm text-slate-900 border-x border-slate-100">{inCart.qty}</span>
                                                    <button onClick={() => updateQty(p, 1)} className="w-8 h-8 flex items-center justify-center text-blue-600 active:scale-90"><i className="fa-solid fa-plus text-xs"></i></button>
                                                </div>
                                            ) : (
                                                <button onClick={() => updateQty(p, 1)} className="bg-slate-900 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow active:scale-90 transition"><i className="fa-solid fa-cart-plus"></i></button>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                                    <h2 className="text-[10px] font-black uppercase text-slate-400 mb-3">Datos del Pedido</h2>
                                    <input type="text" placeholder="Nombre del Cliente *" className="w-full p-4 mb-3 bg-slate-50 rounded-xl text-sm font-bold border-none" value={client.name} onChange={e => setClient({...client, name: e.target.value})} />
                                    <input type="text" placeholder="Dirección de entrega" className="w-full p-4 bg-slate-50 rounded-xl text-sm border-none" value={client.addr} onChange={e => setClient({...client, addr: e.target.value})} />
                                </div>
                                <div className="bg-slate-900 text-white rounded-3xl p-6 shadow-xl">
                                    <div className="space-y-4 mb-6">
                                        {cart.length === 0 && <p className="text-center text-xs text-slate-500 font-bold uppercase py-2">Carrito vacío</p>}
                                        {cart.map(i => (
                                            <div key={i.p.id} className="flex items-center justify-between border-b border-slate-800 pb-4">
                                                <div className="flex-1 pr-2">
                                                    <span className="text-xs font-bold uppercase">{i.p.name}</span>
                                                    <div className="text-[10px] text-slate-400 mt-1">${Number(i.p.price).toFixed(2)} c/u</div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <div className="flex items-center bg-slate-800 rounded-lg p-1">
                                                        <button onClick={() => updateQty(i.p, -1)} className="w-7 h-7 text-blue-400"><i className="fa-solid fa-minus text-[10px]"></i></button>
                                                        <span className="w-6 text-center font-black text-xs">{i.qty}</span>
                                                        <button onClick={() => updateQty(i.p, 1)} className="w-7 h-7 text-blue-400"><i className="fa-solid fa-plus text-[10px]"></i></button>
                                                    </div>
                                                    <span className="font-black text-sm w-12 text-right">${(i.p.price * i.qty).toFixed(2)}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <p className="text-3xl font-black text-center mb-1">${total.toFixed(2)}</p>
                                    <p className="text-[10px] font-bold text-blue-400 uppercase text-center mb-6">Total Bs: {(total * config.tasa_bcv).toFixed(2)}</p>
                                   <button onClick={() => {
    if(cart.length === 0) return alert("Agrega productos primero.");
    if(!client.name) return alert("Ingresa el nombre del cliente.");
    
    let msg = `🛍️ *PEDIDO NUEVO*\n👤 ${client.name}\n📍 ${client.addr || 'N/A'}\n\n`;
    cart.forEach(i => msg += `✅ ${i.qty}x ${i.p.name} ($${(i.p.price*i.qty).toFixed(2)})\n`);
    msg += `\n💰 *TOTAL: $${total.toFixed(2)}* (Bs ${(total * config.tasa_bcv).toFixed(2)})`;
    
    // Abre WhatsApp
    window.open(`https://wa.me/${config.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
    
    // 👇 ESTO ES LO NUEVO: Limpia todo y regresa a la tienda
    setCart([]); 
    setClient({ name: "", addr: "" });
    setView("catalog");
    
}} className={`w-full py-4 rounded-xl font-black uppercase text-xs tracking-widest active:scale-95 transition ${cart.length > 0 ? 'bg-blue-600' : 'bg-slate-700 opacity-50'}`}>
    Enviar Pedido WhatsApp
</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {view === "catalog" && cart.length > 0 && (
                        <div className="fixed bottom-6 w-full max-w-md px-4 z-40">
                            <button onClick={() => setView("cart")} className="w-full bg-blue-600 text-white rounded-2xl shadow-xl p-4 flex justify-between items-center active:scale-95 transition">
                                <span className="font-black text-[10px] uppercase tracking-widest"><span className="bg-slate-900 px-2 py-1 rounded-lg mr-2">{cart.length}</span> Ver Pedido</span>
                                <span className="font-black text-lg">${total.toFixed(2)}</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
