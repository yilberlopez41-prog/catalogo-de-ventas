<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Pro | Freelance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .animate-fade { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen text-slate-400 text-xs uppercase tracking-widest font-black">
            Iniciando Sistema...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // CONFIGURACIÓN (Asegúrate de que estos datos sean correctos)
        const firebaseConfig = {
          apiKey: "AIzaSyBdaejVklzmuQF5wpEECmtIy5Rv6lSDce8",
          authDomain: "catalogo-vendedores-freelance.firebaseapp.com",
          projectId: "catalogo-vendedores-freelance",
          storageBucket: "catalogo-vendedores-freelance.firebasestorage.app",
          messagingSenderId: "994101056111",
          appId: "1:994101056111:web:ee05a0d7f1810e2964739a"
        };

        // Inicialización segura
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const params = new URLSearchParams(window.location.search);
            const vendorId = params.get('v') || 'ventas';

            const [view, setView] = useState("catalog");
            const [products, setProducts] = useState([]);
            const [config, setConfig] = useState({ tasa_bcv: 1, vendorName: "Cargando...", whatsapp: "" });
            const [error, setError] = useState(null);

            useEffect(() => {
                // 1. Cargar Configuración
                const unsubConfig = db.collection('vendors').doc(vendorId).collection('config').doc('general')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            setConfig(doc.data());
                        } else {
                            setError(`No existe el vendedor: ${vendorId}`);
                        }
                    }, err => setError("Error de conexión con Firebase"));

                // 2. Cargar Productos
                const unsubProd = db.collection('vendors').doc(vendorId).collection('products')
                    .onSnapshot(snap => {
                        const items = [];
                        snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                        setProducts(items);
                    });

                return () => { unsubConfig(); unsubProd(); };
            }, [vendorId]);

            if (error) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 text-center">
                    <i className="fa-solid fa-triangle-exclamation text-rose-500 text-3xl mb-4"></i>
                    <p className="text-sm font-bold text-slate-800 uppercase tracking-tighter">{error}</p>
                    <p className="text-[10px] text-slate-400 mt-2 uppercase">Revisa la estructura en Firestore</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl animate-fade">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-30 shadow-lg">
                        <h1 className="text-xs font-black uppercase text-blue-400 tracking-widest">{config.vendorName}</h1>
                        <p className="text-[10px] font-bold text-slate-500 mt-1">TASA: BS {Number(config.tasa_bcv).toFixed(2)}</p>
                    </header>
                    
                    <main className="p-4">
                        <div className="bg-blue-600 p-8 rounded-[2rem] text-white text-center shadow-xl mb-6">
                            <i className="fa-solid fa-check-double text-3xl mb-3"></i>
                            <h2 className="font-black uppercase text-xs tracking-widest">App Conectada</h2>
                            <p className="text-[10px] opacity-70 mt-2">Ya puedes empezar a cargar productos</p>
                        </div>

                        {products.length === 0 ? (
                            <div className="text-center py-10 opacity-30 uppercase font-black text-[10px] tracking-widest">
                                <i className="fa-solid fa-box-open text-2xl mb-2 block"></i>
                                Sin productos en lista
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {products.map(p => (
                                    <div key={p.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                                        <span className="text-xs font-bold uppercase">{p.name}</span>
                                        <span className="font-black text-blue-600">${Number(p.price).toFixed(2)}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 w-full max-w-md p-6 bg-white/80 backdrop-blur-md border-t border-slate-100 flex justify-center">
                        <button onDoubleClick={() => auth.currentUser ? setView("admin") : setView("login")} className="text-slate-200">
                            <i className="fa-solid fa-gear"></i>
                        </button>
                    </footer>
                </div>
            );
        }

        // Vistas de soporte básicas para la prueba
        function LoginScreen({ setView }) { return <div className="p-10 text-center uppercase font-black text-xs">Pantalla de Login</div>; }
        function AdminPanel({ setView }) { return <div className="p-10 text-center uppercase font-black text-xs">Panel Administrativo</div>; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
