<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo | Freelance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .animate-fade { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyBdaejVklzmuQF5wpEECmtIy5Rv6lSDce8",
          authDomain: "catalogo-vendedores-freelance.firebaseapp.com",
          projectId: "catalogo-vendedores-freelance",
          storageBucket: "catalogo-vendedores-freelance.firebasestorage.app",
          messagingSenderId: "994101056111",
          appId: "1:994101056111:web:ee05a0d7f1810e2964739a"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const normalize = (t) => t ? t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

        function App() {
            const params = new URLSearchParams(window.location.search);
            
            // --- AQUÍ ESTÁ EL ARREGLO: Forzamos minúsculas ---
            const vendorId = (params.get('v') || 'ventas').toLowerCase();

            const [view, setView] = useState("catalog");
            const [products, setProducts] = useState([]);
            const [config, setConfig] = useState({ tasa_bcv: 1, vendorName: "Cargando...", whatsapp: "" });
            const [error, setError] = useState(null);

            useEffect(() => {
                // Carga Configuración (vendors/ventas/config/general)
                const unsubConfig = db.collection('vendors').doc(vendorId).collection('config').doc('general')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            setConfig(doc.data());
                            setError(null);
                        } else {
                            setError(`NO EXISTE EL VENDEDOR: ${vendorId.toUpperCase()}`);
                        }
                    }, err => setError("Error de conexión con Firebase"));

                // Carga Productos
                const unsubProd = db.collection('vendors').doc(vendorId).collection('products')
                    .onSnapshot(snap => {
                        const items = [];
                        snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                        setProducts(items);
                    });

                return () => { unsubConfig(); unsubProd(); };
            }, [vendorId]);

            if (error) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 text-center">
                    <i className="fa-solid fa-triangle-exclamation text-rose-500 text-3xl mb-4"></i>
                    <p className="text-sm font-black text-slate-800 uppercase tracking-tighter">{error}</p>
                    <p className="text-[10px] text-slate-400 mt-2 uppercase">Revisa la estructura en Firestore</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl animate-fade overflow-hidden">
                    {(view === "catalog" || view === "cart") && <Storefront view={view} setView={setView} products={products} config={config} />}
                    {view === "login" && <LoginScreen setView={setView} />}
                </div>
            );
        }

        function Storefront({ view, setView, products, config }) {
            const [search, setSearch] = useState("");
            const [cart, setCart] = useState([]);
            const [client, setClient] = useState({ name: "", addr: "" });

            const filtered = products.filter(p => p.isActive !== false && normalize(p.name).includes(normalize(search)));
            const total = cart.reduce((s, i) => s + (i.p.price * i.qty), 0);

            const updateQty = (p, delta) => {
                const existing = cart.find(item => item.p.id === p.id);
                if (existing) {
                    const newQty = existing.qty + delta;
                    if (newQty <= 0) {
                        setCart(cart.filter(item => item.p.id !== p.id));
                    } else {
                        setCart(cart.map(item => item.p.id === p.id ? { ...item, qty: newQty } : item));
                    }
                } else if (delta > 0) {
                    setCart([...cart, { p, qty: 1 }]);
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-slate-900 text-white p-5 sticky top-0 z-30 shadow-xl border-b border-slate-800">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-xs font-black uppercase text-blue-400 tracking-wider">{config.vendorName}</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase">Tasa: Bs {Number(config.tasa_bcv).toFixed(2)}</p>
                            </div>
                            <button onClick={() => setView(view === 'catalog' ? 'cart' : 'catalog')} className="bg-slate-800 p-3 rounded-xl relative border border-slate-700">
                                <i className={`fa-solid ${view === 'catalog' ? 'fa-cart-shopping' : 'fa-arrow-left'}`}></i>
                                {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-rose-500 text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center shadow-md">{cart.length}</span>}
                            </button>
                        </div>
                        {view === "catalog" && (
                            <input type="text" placeholder="¿Qué buscas?" className="w-full px-4 py-2.5 rounded-xl bg-slate-800 text-sm border-none text-white focus:ring-2 focus:ring-blue-500" value={search} onChange={e => setSearch(e.target.value)} />
                        )}
                    </header>
                    
                    <main className="p-4 flex-1 pb-32">
                        {view === "catalog" ? (
                            <div className="space-y-3">
                                {filtered.map(p => {
                                    const inCart = cart.find(i => i.p.id === p.id);
                                    return (
                                        <div key={p.id} className={`bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border transition-all ${inCart ? 'border-blue-400 bg-blue-50/10' : 'border-slate-100'}`}>
                                            <div className="flex-1 pr-3 truncate">
                                                <h3 className="text-xs font-bold text-slate-800 uppercase truncate leading-tight">{p.name}</h3>
                                                <p className="text-lg font-black text-slate-950 mt-1">${Number(p.price).toFixed(2)}</p>
                                            </div>
                                            {inCart ? (
                                                <div className="flex items-center bg-white rounded-xl shadow-md border border-slate-200 p-1">
                                                    <button onClick={() => updateQty(p, -1)} className="w-8 h-8 flex items-center justify-center text-blue-600 active:scale-90"><i className="fa-solid fa-minus text-xs"></i></button>
                                                    <span className="w-10 text-center font-black text-sm text-slate-900 border-x border-slate-100">{inCart.qty}</span>
                                                    <button onClick={() => updateQty(p, 1)} className="w-8 h-8 flex items-center justify-center text-blue-600 active:scale-90"><i className="fa-solid fa-plus text-xs"></i></button>
                                                </div>
                                            ) : (
                                                <button onClick={() => updateQty(p, 1)} className="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition"><i className="fa-solid fa-cart-plus"></i></button>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                        ) : (
                            /* Vista Carrito */
                            <div className="space-y-4">
                                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                    <input type="text" placeholder="Tu Nombre *" className="w-full p-4 mb-3 bg-slate-50 rounded-2xl text-sm font-bold border-none" value={client.name} onChange={e => setClient({...client, name: e.target.value})} />
                                    <input type="text" placeholder="Dirección" className="w-full p-4 bg-slate-50 rounded-2xl text-sm border-none" value={client.addr} onChange={e => setClient({...client, addr: e.target.value})} />
                                </div>
                                <div className="bg-slate-900 text-white rounded-3xl p-6 shadow-xl">
                                    <div className="space-y-3 mb-6">
                                        {cart.map(i => (
                                            <div key={i.p.id} className="flex justify-between text-xs border-b border-slate-800 pb-2">
                                                <span>{i.p.name} (x{i.qty})</span>
                                                <span className="font-black">${(i.p.price * i.qty).toFixed(2)}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <p className="text-3xl font-black text-center mb-1">${total.toFixed(2)}</p>
                                    <p className="text-[10px] font-bold text-blue-400 uppercase text-center mb-6 tracking-widest">Bs {(total * config.tasa_bcv).toFixed(2)}</p>
                                    <button onClick={() => {
                                        if(!client.name) return alert("Indica el nombre del cliente");
                                        let msg = `🛍️ *PEDIDO: ${client.name}*\n\n`;
                                        cart.forEach(i => msg += `✅ *${i.qty}x ${i.p.name}* ($${(i.p.price*i.qty).toFixed(2)})\n`);
                                        msg += `\n💰 *TOTAL: $${total.toFixed(2)}*\n🇻🇪 _(Ref: Bs ${(total * config.tasa_bcv).toFixed(2)})_`;
                                        window.open(`https://wa.me/${config.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
                                    }} className="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition shadow-lg shadow-blue-500/20">Enviar a WhatsApp</button>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="py-8 text-center opacity-10"><button onDoubleClick={() => setView("login")}><i className="fa-solid fa-gear"></i></button></footer>
                </div>
            );
        }

        function LoginScreen({ setView }) { return <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 text-white text-[10px] font-black uppercase tracking-widest">Pantalla de Login</div>; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
